# Homebrew packages installed by bootstrap.sh — the single source of truth.
# Edit this list to add or remove dependencies; bootstrap.sh reads from it.

# Third-party taps to add before installing (needed by some casks below).
taps:
  - manaflow-ai/cmux

# Regular formulae, always installed (brew install is idempotent).
# Version snapshots are informational — Homebrew installs the current version.
formulae:
  - neovim              # snapshot: 0.11.6
  - zsh                 # snapshot: 5.9.1
  - zsh-autosuggestions # snapshot: 0.7.1
  - vim                 # snapshot: 9.2.0750

# Installed only if the command on the left isn't already on PATH.
# Format per entry: "command=formula".  (none currently)
formulae_if_missing: []

# GUI apps installed via `brew install --cask`.
# Fully-qualified token avoids collision with the unrelated homebrew-cask "cmux".
casks:
  - manaflow-ai/cmux/cmux   # snapshot: 0.64.17
